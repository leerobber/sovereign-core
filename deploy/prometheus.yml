global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sovereign-core'

scrape_configs:
  - job_name: 'sovereign-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'ollama-nvidia'
    static_configs:
      - targets: ['inference-nvidia:11434']
    metrics_path: '/metrics'

  - job_name: 'ollama-amd'
    static_configs:
      - targets: ['inference-amd:11434']
    metrics_path: '/metrics'

  - job_name: 'ollama-cpu'
    static_configs:
      - targets: ['inference-cpu:11434']
    metrics_path: '/metrics'

  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8000']
    metrics_path: '/metrics'
