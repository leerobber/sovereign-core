name: Sovereign Core CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Create data directories
        run: mkdir -p data/kairos/agents data/ledger data/pattern_memory logs

      - name: Run tests with coverage
        env:
          SOVEREIGN_DB_PATH: data/test_sovereign.db
          GATEWAY_API_KEY: ""
          SOVEREIGN_GATEWAY_URL: http://localhost:8080
        run: |
          pytest tests/ -v --cov=gateway --cov=kairos --cov=memory_palace \
            --cov-report=term-missing --cov-report=xml \
            --timeout=30 -x --ignore=tests/test_diffusion_router.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check . --select=E,F --ignore=E501
        continue-on-error: true
