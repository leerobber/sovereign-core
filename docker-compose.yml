version: "3.9"

# ╔══════════════════════════════════════════════════════════════════╗
# ║  Sovereign Core — Full Stack Docker Compose                      ║
# ║  Services: gateway · inference-nvidia · inference-amd            ║
# ║            · inference-cpu · chromadb · prometheus · grafana     ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  # ── Heterogeneous Compute Gateway ────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sovereign-gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
      GATEWAY_BACKEND_TIMEOUT: "30"
      GATEWAY_HEALTH_CHECK_INTERVAL: "5"
      GATEWAY_FAILURE_THRESHOLD: "3"
      GATEWAY_RECOVERY_THRESHOLD: "2"
      GATEWAY_LATENCY_EMA_ALPHA: "0.2"
      BACKEND_NVIDIA_URL: "http://inference-nvidia:11434"
      BACKEND_AMD_URL: "http://inference-amd:11434"
      BACKEND_CPU_URL: "http://inference-cpu:11434"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - gateway-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - sovereign

  # ── NVIDIA RTX 5050 — Primary Inference (8GB VRAM) ───────────────
  inference-nvidia:
    image: ollama/ollama:latest
    container_name: sovereign-nvidia
    ports:
      - "8001:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama-nvidia:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_FLASH_ATTENTION: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sovereign

  # ── AMD Radeon 780M — Secondary Inference (4GB VRAM) ─────────────
  inference-amd:
    image: ollama/ollama:rocm
    container_name: sovereign-amd
    ports:
      - "8002:11434"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    environment:
      OLLAMA_HOST: "0.0.0.0"
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      ROCR_VISIBLE_DEVICES: "0"
      OLLAMA_NUM_PARALLEL: "2"
    volumes:
      - ollama-amd:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sovereign

  # ── Ryzen 7 — CPU Fallback ────────────────────────────────────────
  inference-cpu:
    image: ollama/ollama:latest
    container_name: sovereign-cpu
    ports:
      - "8003:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_NUM_THREAD: "8"
    volumes:
      - ollama-cpu:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sovereign

  # ── ChromaDB Vector Store ──────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: sovereign-chroma
    ports:
      - "8004:8000"
    volumes:
      - chroma-data:/chroma/.chroma
    environment:
      CHROMA_SERVER_HOST: "0.0.0.0"
      CHROMA_SERVER_HTTP_PORT: "8000"
      ALLOW_RESET: "false"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - sovereign

  # ── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - sovereign

  # ── Grafana Dashboard ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sovereign-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: "sovereign"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-sovereign}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/sovereign.json"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sovereign

volumes:
  gateway-data:
  ollama-nvidia:
  ollama-amd:
  ollama-cpu:
  chroma-data:
  prometheus-data:
  grafana-data:

networks:
  sovereign:
    driver: bridge
